services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: Hammad
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Hammad"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
