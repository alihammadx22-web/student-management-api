spring.application.name=backend
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/Hammad}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
server.port=${SERVER_PORT:8084}

app.jwt.secret=${JWT_SECRET:change-this-development-secret-key-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

app.admin.enabled=${ADMIN_ENABLED:false}
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:}
